<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Diwan AI Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/mammoth@1.8.0/mammoth.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Cairo", sans-serif;
      }

      .paper {
        background: white;
        box-shadow: 0 16px 40px rgba(0, 0, 0, 0.12);
        border: 1px solid #e4e4e7;
      }

      .poem-line {
        margin-bottom: var(--line-gap, 1rem);
      }

      .group-gap {
        margin-bottom: var(--paragraph-gap, 1.2rem);
      }

      .verse-grid {
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: center;
      }

      .hamish-right {
        text-align: right;
      }

      .hamish-left {
        text-align: left;
      }

      .spacer {
        color: #9ca3af;
        padding-inline: 0.8rem;
      }

      .preview-content {
        font-family: "Amiri", serif;
        white-space: pre-wrap;
        line-height: 1.8;
      }

      .control-box {
        border: 1px solid #e5e7eb;
        border-radius: 12px;
        padding: 0.75rem;
        background: #fafafa;
      }

      input[type="range"] {
        width: 100%;
      }
    </style>
  </head>

  <body class="bg-zinc-100 text-zinc-800">
    <main class="max-w-7xl mx-auto px-4 py-6 space-y-4">
      <header class="bg-white rounded-xl p-4 shadow-sm border border-zinc-200">
        <h1 class="text-2xl font-bold">Diwan AI Studio</h1>
        <p class="text-sm text-zinc-500">محرر احترافي لتنسيق الشعر العربي وإخراج صفحات ديوان جاهزة للطباعة</p>
      </header>

      <section class="grid lg:grid-cols-3 gap-4">
        <div class="lg:col-span-1 space-y-4">
          <div class="bg-white rounded-xl p-4 shadow-sm border border-zinc-200 space-y-3">
            <h2 class="font-bold">1) معلومات المشروع</h2>
            <label class="block text-sm">عنوان الديوان
              <input id="diwanTitle" class="mt-1 w-full rounded border border-zinc-300 p-2" value="ديوان التأملات" />
            </label>
            <label class="block text-sm">عنوان القصيدة
              <input id="poemTitle" class="mt-1 w-full rounded border border-zinc-300 p-2" value="على ضفاف الحنين" />
            </label>
            <label class="block text-sm">اسم الشاعر
              <input id="poetName" class="mt-1 w-full rounded border border-zinc-300 p-2" value="شاعر مجهول" />
            </label>
            <label class="block text-sm">حجم الصفحة
              <select id="pageSize" class="mt-1 w-full rounded border border-zinc-300 p-2">
                <option value="A4">A4</option>
                <option value="B5">B5</option>
                <option value="A5">A5</option>
              </select>
            </label>
          </div>

          <div class="bg-white rounded-xl p-4 shadow-sm border border-zinc-200 space-y-3">
            <h2 class="font-bold">2) بنية القصيدة</h2>
            <select id="layoutStyle" class="w-full rounded border border-zinc-300 p-2">
              <option value="parallel">الموازي</option>
              <option value="lame">العرجاء</option>
              <option value="triple">الثلاثي</option>
              <option value="center">أسلوب الوسط</option>
              <option value="takhmees">التخميس</option>
            </select>
            <button id="analyzeBtn" class="w-full bg-zinc-900 text-white rounded p-2">Analyze Poem</button>
            <p id="analysisResult" class="text-sm text-zinc-600">التحليل الذكي: بانتظار التحليل…</p>
          </div>

          <div class="bg-white rounded-xl p-4 shadow-sm border border-zinc-200 space-y-3">
            <h2 class="font-bold">3) التحكم الطباعي</h2>

            <div class="control-box text-sm">حجم الخط: <span id="fontSizeVal">24</span>px
              <input id="fontSize" type="range" min="16" max="36" value="24" />
            </div>
            <div class="control-box text-sm">تباعد الأسطر: <span id="lineHeightVal">1.9</span>
              <input id="lineHeight" type="range" min="1.2" max="3" step="0.1" value="1.9" />
            </div>
            <div class="control-box text-sm">تباعد الفقرات: <span id="paragraphSpacingVal">16</span>px
              <input id="paragraphSpacing" type="range" min="0" max="48" value="16" />
            </div>
            <div class="control-box text-sm">إزاحة البداية: <span id="indentVal">0</span>px
              <input id="indent" type="range" min="0" max="80" value="0" />
            </div>

            <div class="grid grid-cols-2 gap-2 text-sm">
              <label>الهامش العلوي (مم)
                <input id="marginTop" type="number" min="10" max="50" value="20" class="mt-1 w-full rounded border border-zinc-300 p-2" />
              </label>
              <label>الهامش السفلي (مم)
                <input id="marginBottom" type="number" min="10" max="50" value="20" class="mt-1 w-full rounded border border-zinc-300 p-2" />
              </label>
              <label>الهامش الأيمن (مم)
                <input id="marginRight" type="number" min="10" max="50" value="20" class="mt-1 w-full rounded border border-zinc-300 p-2" />
              </label>
              <label>الهامش الأيسر (مم)
                <input id="marginLeft" type="number" min="10" max="50" value="20" class="mt-1 w-full rounded border border-zinc-300 p-2" />
              </label>
            </div>

            <div class="grid grid-cols-2 gap-2">
              <button id="saveDraft" class="rounded border border-zinc-300 p-2">حفظ المسودة</button>
              <button id="loadDraft" class="rounded border border-zinc-300 p-2">تحميل المسودة</button>
              <label class="rounded border border-zinc-300 p-2 text-center cursor-pointer col-span-2">استيراد DOCX
                <input id="docxInput" type="file" accept=".docx" class="hidden" />
              </label>
              <button id="exportPdf" class="col-span-2 rounded bg-emerald-700 text-white p-2">تصدير PDF جاهز للطباعة</button>
            </div>
          </div>
        </div>

        <div class="lg:col-span-2 grid gap-4">
          <div class="bg-white rounded-xl p-4 shadow-sm border border-zinc-200">
            <h2 class="font-bold mb-2">4) محرر القصيدة</h2>
            <div class="flex flex-wrap gap-2 mb-2">
              <button data-action="bold" class="fmt rounded border px-3 py-1">Bold</button>
              <button data-action="italic" class="fmt rounded border px-3 py-1">Italic</button>
              <button data-action="increase" class="fmt rounded border px-3 py-1">A+</button>
              <button data-action="decrease" class="fmt rounded border px-3 py-1">A-</button>
              <button data-action="allBold" class="fmt rounded border px-3 py-1">Bold All</button>
            </div>
            <textarea id="poemInput" class="w-full h-64 rounded border border-zinc-300 p-3 leading-8" dir="rtl" placeholder="ألصق القصيدة هنا...">يا ليلُ هذا القلبُ ما زالَ ينتظرُ *** بينَ الحروفِ حنينُهُ يتكسّرُ
نادتْ خطاهُ الريحَ: هل من عودةٍ؟ *** فالوجدُ في صدرِ المسافاتِ يسهرُ

في كلِّ بيتٍ من قصيدتِنا رؤى *** وعلى حوافِ الصمتِ نجمٌ يُزهرُ
أمضي وتبقى في يديك قصائدي *** فالعمرُ دونَ هواكِ شيءٌ يُقهرُ</textarea>
          </div>

          <div class="bg-white rounded-xl p-4 shadow-sm border border-zinc-200">
            <h2 class="font-bold mb-2">5) معاينة الصفحة الحية</h2>
            <div class="overflow-auto bg-zinc-200 p-4 rounded-lg">
              <div id="page" class="paper mx-auto" aria-label="print-preview">
                <div id="innerPage" class="h-full"></div>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <script>
      const pageSizes = {
        A4: { w: 210, h: 297 },
        B5: { w: 176, h: 250 },
        A5: { w: 148, h: 210 },
      };

      const state = {
        fontSize: 24,
        lineHeight: 1.9,
        paragraphSpacing: 16,
        indent: 0,
      };

      const poemInput = document.getElementById("poemInput");

      function applyInlineStyle(openTag, closeTag) {
        const start = poemInput.selectionStart;
        const end = poemInput.selectionEnd;
        const text = poemInput.value;
        const selected = text.slice(start, end);
        const replacement = `${openTag}${selected}${closeTag}`;
        poemInput.value = text.slice(0, start) + replacement + text.slice(end);
        poemInput.focus();
        poemInput.selectionStart = start;
        poemInput.selectionEnd = start + replacement.length;
        renderPreview();
      }

      function mmToPx(mm) {
        return mm * 3.7795;
      }

      function normalizeGroups(raw) {
        return raw
          .split(/\n\s*\n/)
          .map((group) => group.split("\n").map((line) => line.trim()).filter(Boolean))
          .filter((group) => group.length > 0);
      }

      function splitHemistich(line) {
        if (line.includes("***")) {
          const [r, l] = line.split("***");
          return [r.trim(), l.trim()];
        }
        const words = line.split(/\s+/);
        const pivot = Math.ceil(words.length / 2);
        return [words.slice(0, pivot).join(" "), words.slice(pivot).join(" ")];
      }

      function decorateText(line) {
        return line
          .replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>")
          .replace(/__(.*?)__/g, "<em>$1</em>")
          .replace(/\[size:(\d+)\](.*?)\[\/size\]/g, "<span style='font-size:$1px'>$2</span>");
      }

      function lineTemplate(line, style, index) {
        const safe = decorateText(line);

        if (style === "parallel") {
          const [rightPart, leftPart] = splitHemistich(line);
          return `<div class='verse-grid poem-line'>
              <div class='hamish-right'>${decorateText(rightPart)}</div>
              <div class='spacer'>✦</div>
              <div class='hamish-left'>${decorateText(leftPart)}</div>
            </div>`;
        }

        if (style === "lame") {
          const alignClass = index % 2 === 0 ? "text-right" : "text-left";
          return `<div class='poem-line ${alignClass}'>${safe}</div>`;
        }

        if (style === "triple") {
          if (index % 2 === 0) {
            return `<div class='poem-line text-center'>${safe}</div>`;
          }
          const [rightPart, leftPart] = splitHemistich(line);
          return `<div class='verse-grid poem-line'><div class='hamish-right'>${decorateText(rightPart)}</div><div></div><div class='hamish-left'>${decorateText(leftPart)}</div></div>`;
        }

        if (style === "center") {
          return `<div class='poem-line text-center'>${safe}</div>`;
        }

        if (style === "takhmees") {
          const mod = index % 3;
          const cls = mod < 2 ? "text-center" : "text-right";
          return `<div class='poem-line ${cls}'>${safe}</div>`;
        }

        return `<div class='poem-line'>${safe}</div>`;
      }

      function suggestStyle(lines) {
        if (lines.every((l) => l.includes("***"))) return "parallel";
        if (lines.length >= 4 && lines.every((_, i) => i % 2 === 0 || i % 2 === 1)) return "lame";
        const shortLines = lines.filter((l) => l.split(" ").length <= 4).length;
        if (shortLines > lines.length / 2) return "center";
        if (lines.length % 3 === 0) return "takhmees";
        return "triple";
      }

      function renderPreview() {
        const page = document.getElementById("page");
        const inner = document.getElementById("innerPage");
        const layout = document.getElementById("layoutStyle").value;

        document.getElementById("fontSizeVal").textContent = state.fontSize;
        document.getElementById("lineHeightVal").textContent = state.lineHeight;
        document.getElementById("paragraphSpacingVal").textContent = state.paragraphSpacing;
        document.getElementById("indentVal").textContent = state.indent;

        const selectedSize = pageSizes[document.getElementById("pageSize").value];
        page.style.width = `${mmToPx(selectedSize.w)}px`;
        page.style.height = `${mmToPx(selectedSize.h)}px`;

        const margins = {
          top: +document.getElementById("marginTop").value,
          bottom: +document.getElementById("marginBottom").value,
          right: +document.getElementById("marginRight").value,
          left: +document.getElementById("marginLeft").value,
        };

        inner.style.paddingTop = `${mmToPx(margins.top)}px`;
        inner.style.paddingBottom = `${mmToPx(margins.bottom)}px`;
        inner.style.paddingRight = `${mmToPx(margins.right)}px`;
        inner.style.paddingLeft = `${mmToPx(margins.left)}px`;

        const groups = normalizeGroups(poemInput.value);
        const title = document.getElementById("poemTitle").value;
        const poet = document.getElementById("poetName").value;
        const diwan = document.getElementById("diwanTitle").value;

        let html = `
          <div class='text-center mb-4'>
            <div class='text-sm text-zinc-500'>${diwan}</div>
            <h3 class='text-3xl font-bold'>${title}</h3>
            <div class='text-base text-zinc-600'>${poet}</div>
          </div>
          <div class='preview-content' style='font-size:${state.fontSize}px; line-height:${state.lineHeight}; text-indent:${state.indent}px; --line-gap: ${state.paragraphSpacing / 2}px; --paragraph-gap:${state.paragraphSpacing}px;'>`;

        groups.forEach((group) => {
          html += `<div class='group-gap'>`;
          group.forEach((line, idx) => {
            html += lineTemplate(line, layout, idx);
          });
          html += `</div>`;
        });

        html += "</div>";
        inner.innerHTML = html;
      }

      document.querySelectorAll("input, select, textarea").forEach((el) => {
        el.addEventListener("input", () => {
          if (el.id === "fontSize") state.fontSize = +el.value;
          if (el.id === "lineHeight") state.lineHeight = +el.value;
          if (el.id === "paragraphSpacing") state.paragraphSpacing = +el.value;
          if (el.id === "indent") state.indent = +el.value;
          renderPreview();
        });
      });

      document.querySelectorAll(".fmt").forEach((btn) => {
        btn.addEventListener("click", () => {
          const action = btn.dataset.action;
          if (action === "bold") applyInlineStyle("**", "**");
          if (action === "italic") applyInlineStyle("__", "__");
          if (action === "increase") applyInlineStyle("[size:30]", "[/size]");
          if (action === "decrease") applyInlineStyle("[size:18]", "[/size]");
          if (action === "allBold") {
            poemInput.value = poemInput.value
              .split("\n")
              .map((l) => (l.trim() ? `**${l}**` : l))
              .join("\n");
            renderPreview();
          }
        });
      });

      document.getElementById("analyzeBtn").addEventListener("click", () => {
        const lines = poemInput.value.split("\n").map((l) => l.trim()).filter(Boolean);
        const suggestion = suggestStyle(lines);
        document.getElementById("layoutStyle").value = suggestion;
        const names = {
          parallel: "الموازي",
          lame: "العرجاء",
          triple: "الثلاثي",
          center: "أسلوب الوسط",
          takhmees: "التخميس",
        };
        document.getElementById("analysisResult").textContent = `التحليل الذكي: نقترح نمط ${names[suggestion]} بناءً على بنية الأبيات.`;
        renderPreview();
      });

      document.getElementById("saveDraft").addEventListener("click", () => {
        const payload = {
          poemInput: poemInput.value,
          diwanTitle: document.getElementById("diwanTitle").value,
          poemTitle: document.getElementById("poemTitle").value,
          poetName: document.getElementById("poetName").value,
          pageSize: document.getElementById("pageSize").value,
          layoutStyle: document.getElementById("layoutStyle").value,
          state,
          margins: {
            top: document.getElementById("marginTop").value,
            bottom: document.getElementById("marginBottom").value,
            right: document.getElementById("marginRight").value,
            left: document.getElementById("marginLeft").value,
          },
        };
        localStorage.setItem("diwanDraft", JSON.stringify(payload));
        alert("تم حفظ المسودة محلياً");
      });

      document.getElementById("loadDraft").addEventListener("click", () => {
        const raw = localStorage.getItem("diwanDraft");
        if (!raw) {
          alert("لا توجد مسودة محفوظة");
          return;
        }
        const draft = JSON.parse(raw);
        poemInput.value = draft.poemInput || "";
        document.getElementById("diwanTitle").value = draft.diwanTitle || "";
        document.getElementById("poemTitle").value = draft.poemTitle || "";
        document.getElementById("poetName").value = draft.poetName || "";
        document.getElementById("pageSize").value = draft.pageSize || "A4";
        document.getElementById("layoutStyle").value = draft.layoutStyle || "parallel";

        state.fontSize = +draft.state.fontSize;
        state.lineHeight = +draft.state.lineHeight;
        state.paragraphSpacing = +draft.state.paragraphSpacing;
        state.indent = +draft.state.indent;

        document.getElementById("fontSize").value = state.fontSize;
        document.getElementById("lineHeight").value = state.lineHeight;
        document.getElementById("paragraphSpacing").value = state.paragraphSpacing;
        document.getElementById("indent").value = state.indent;

        document.getElementById("marginTop").value = draft.margins.top;
        document.getElementById("marginBottom").value = draft.margins.bottom;
        document.getElementById("marginRight").value = draft.margins.right;
        document.getElementById("marginLeft").value = draft.margins.left;

        renderPreview();
      });

      document.getElementById("docxInput").addEventListener("change", async (event) => {
        const file = event.target.files[0];
        if (!file) return;
        const arrayBuffer = await file.arrayBuffer();
        const result = await mammoth.extractRawText({ arrayBuffer });
        poemInput.value = result.value.trim();
        renderPreview();
      });

      document.getElementById("exportPdf").addEventListener("click", async () => {
        const page = document.getElementById("page");
        const canvas = await html2canvas(page, { scale: 2, backgroundColor: "#ffffff", useCORS: true });
        const image = canvas.toDataURL("image/png");
        const { jsPDF } = window.jspdf;

        const selectedSize = pageSizes[document.getElementById("pageSize").value];
        const pdf = new jsPDF({ orientation: selectedSize.w > selectedSize.h ? "l" : "p", unit: "mm", format: [selectedSize.w, selectedSize.h] });
        pdf.addImage(image, "PNG", 0, 0, selectedSize.w, selectedSize.h, undefined, "FAST");
        pdf.save(`${document.getElementById("poemTitle").value || "poem"}.pdf`);
      });

      renderPreview();
    </script>
  </body>
</html>
